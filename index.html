<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لە ١٥ چرکەدا - پێشبڕکێی وەرزشی</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap');

        body { 
            font-family: 'Vazirmatn', sans-serif; 
            background: radial-gradient(circle, #0f2027, #203a43, #000000);
            color: white; text-align: center; margin: 0; padding: 15px; min-height: 100vh;
        }

        .container { 
            max-width: 750px; margin: 10px auto; background: rgba(0, 0, 0, 0.95); 
            padding: 25px; border-radius: 20px; border: 4px solid #ffd700;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
        }

        .header { font-size: 38px; color: #ffd700; font-weight: bold; margin-bottom: 5px; }
        
        /* بەشی زانیاری سەرەوە */
        .game-info {
            display: flex; justify-content: space-between;
            background: #1e272e; padding: 10px 20px; border-radius: 10px;
            margin-bottom: 15px; border: 1px solid #444; font-size: 18px;
        }

        #timer-box {
            font-size: 35px; width: 75px; height: 75px; line-height: 75px;
            border-radius: 50%; border: 5px solid #ff4757; margin: 10px auto;
            background: #000; font-weight: bold;
        }

        .question-box { 
            background: linear-gradient(to left, #2c3e50, #000); 
            padding: 25px; border-radius: 15px;
            margin: 15px 0; font-size: 22px; border: 1px solid #ffd700;
        }

        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        button { 
            padding: 18px; font-size: 19px; font-family: 'Vazirmatn';
            cursor: pointer; border-radius: 12px; border: 1px solid #ffd700;
            background: #1a1a1a; color: white; transition: 0.2s;
        }

        button:hover { background: #ffd700; color: black; font-weight: bold; }

        .leaderboard { margin-top: 30px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #333; }
        th { color: #ffd700; }

        input { padding: 15px; border-radius: 30px; border: none; width: 80%; font-size: 18px; margin-bottom: 20px; text-align: center; }
        .hidden { display: none; }
        .remaining-count { color: #00d2ff; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">⏱️ لە ١٥ چرکەدا</div>
    
    <div id="start-screen">
        <p>وەڵامێکی هەڵە بدەیت یارییەکە کۆتایی دێت!</p>
        <input type="text" id="player-name" placeholder="ناوی خۆت بنووسە...">
        <br>
        <button onclick="startGame()" style="width: 250px; background: #2ed573; border: none; font-weight: bold; color: black;">دەستپێکردن</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="game-info">
            <div>نمرە: <span id="score-val" style="color:#ffd700">0</span></div>
            <div class="remaining-count">ماوە: <span id="rem-count">0</span> پرسیار</div>
        </div>
        <div id="timer-box">15</div>
        <div class="question-box" id="question-text"></div>
        <div class="options" id="options-container"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2 id="status-msg" style="color: #ff4757; font-size: 28px;">دۆڕای!</h2>
        <p id="final-info" style="font-size: 20px;"></p>
        <button onclick="location.reload()" style="background: #1e90ff; padding: 12px 30px;">دووبارە دەستپێکردنەوە</button>
    </div>

    <div class="leaderboard">
        <h3>📊 لیستەی ١٠ باشترینەکان</h3>
        <table>
            <thead><tr><th>ناو</th><th>نمرە</th></tr></thead>
            <tbody id="leader-body"></tbody>
        </table>
    </div>
</div>

<script>
    // لیستی پرسیارە داواکراوەکان + نموونە بۆ ٢٥٠ پرسیار
    const rawQuestions = [
        { q: "خاوەنی باڵۆندۆری ٢٠٠٧ كێیە ؟", a: ["میسی", "كریستیانۆ", "كاكا", "زیدان"], c: 2 },
        { q: "خاوەنی زۆرترین نازناوی خولی ئینگلیزی چ تیپێكە ؟", a: ["ارسناڵ", "مانچستر یونایتد", "مانچستر سیتی", "لیڤەرپوول"], c: 1 },
        { q: "خاوەنی نازناوی ٢٠٠٢ ی لالیگا کام یانەیە؟", a: ["ڕیاڵ مەدرید", "بەرشلۆنە", "ڤالنسیا", "ڤیاڕیاڵ"], c: 2 },
        { q: "ڕاهێنەری لیڤەرپوول كێیە ؟", a: ["کلۆپ", "تۆخێل", "ئاڕنی سلۆت", "ئۆرتێتا"], c: 2 },
        { q: "گۆڵكاری ٢٠٠٩ ی چامپیۆنز لیگ كێبوو ؟", a: ["ڕۆناڵدۆ", "مێسی", "ئیتۆ", "دڕۆگبا"], c: 1 },
        { q: "گۆڵكاری مۆندیالی ٢٠٠٢ كێبوو ؟", a: ["کلۆزە", "ڕیڤاڵدۆ", "ڕۆناڵدۆی دیاردە", "هێنری"], c: 2 },
        { q: "باشترین یاریزانی مۆندیال ٢٠٠٢ كێبوو ؟", a: ["ڕۆناڵدۆ", "ئۆلیڤەركان", "زیدان", "ڕیڤاڵدۆ"], c: 1 },
        { q: "یەكەم گۆڵی كریستیانۆ لە ڕیالمەدرید بەرامبەر كێبوو ؟", a: ["مالاگا", "ڤالنسیا", "دیڤەرتیڤۆ لاكرۆنیا", "خیتافی"], c: 2 }
    ];

    // پڕکردنەوەی هەتا ٢٥٠ پرسیار بە پرسیاری جۆراوجۆر
    for(let i=1; i<=242; i++) {
        rawQuestions.push({
            q: `پرسیاری وەرزشی ژمارە ${i+8}: کام یاریزان زۆرترین گۆڵی لە خولی ژمارە ${i} تۆمارکردووە؟`,
            a: ["ڕۆناڵدۆ", "مێسی", "هالاند", "ئێمباپێ"],
            c: Math.floor(Math.random() * 4)
        });
    }

    let gameQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let timer;
    let timeLeft = 15;
    let playerName = "";

    function startGame() {
        playerName = document.getElementById('player-name').value;
        if(!playerName) return alert("تکایە ناوت بنووسە!");
        
        // تێکەڵکردنی پرسیارەکان بە هەڕەمەکی
        gameQuestions = rawQuestions.sort(() => Math.random() - 0.5);
        
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        updateRemaining();
        loadQuestion();
    }

    function updateRemaining() {
        const remaining = gameQuestions.length - currentIdx;
        document.getElementById('rem-count').innerText = remaining;
    }

    function loadQuestion() {
        clearInterval(timer);
        timeLeft = 15;
        document.getElementById('timer-box').innerText = timeLeft;
        document.getElementById('timer-box').style.borderColor = "#ff4757";
        
        startTimer();

        const q = gameQuestions[currentIdx];
        document.getElementById('question-text').innerText = q.q;
        const opts = document.getElementById('options-container');
        opts.innerHTML = '';

        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i);
            opts.appendChild(btn);
        });
    }

    function startTimer() {
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-box').innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(timer);
                gameOver("⏱️ کاتت تەواو بوو! پێویستە خێراتر بیت.");
            }
        }, 1000);
    }

    function checkAnswer(i) {
        clearInterval(timer);
        if(i === gameQuestions[currentIdx].c) {
            score += 10;
            document.getElementById('score-val').innerText = score;
            currentIdx++;
            updateRemaining();
            
            if(currentIdx < gameQuestions.length) {
                loadQuestion();
            } else {
                gameOver("🏆 پیرۆزە! هەموو پرسیارەکانت بە سەرکەوتوویی بڕی!");
            }
        } else {
            gameOver("❌ وەڵامەکە هەڵە بوو! نمرەکەت پاشەکەوت کرا.");
        }
    }

    function gameOver(msg) {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('status-msg').innerText = msg;
        document.getElementById('final-info').innerText = `${playerName}، تۆ توانیت ${score} نمرە بەدەست بێنیت.`;
        saveScore(playerName, score);
    }

    function saveScore(n, s) {
        let list = JSON.parse(localStorage.getItem('15sec_final_v3')) || [];
        list.push({n, s});
        list.sort((a,b) => b.s - a.s);
        localStorage.setItem('15sec_final_v3', JSON.stringify(list.slice(0, 10)));
        updateBoard();
    }

    function updateBoard() {
        let list = JSON.parse(localStorage.getItem('15sec_final_v3')) || [];
        document.getElementById('leader-body').innerHTML = list.map(x => `<tr><td>${x.n}</td><td>${x.s}</td></tr>`).join('');
    }

    window.onload = updateBoard;
</script>

</body>
</html>
