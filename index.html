<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لە ١٥ چرکەدا - پێشبڕکێی وەرزشی</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap');

        body { 
            font-family: 'Vazirmatn', sans-serif; 
            background: radial-gradient(circle, #001529, #000c18);
            color: white; text-align: center; margin: 0; padding: 10px; min-height: 100vh;
        }

        .container { 
            max-width: 800px; margin: 15px auto; background: #001e36; 
            padding: 25px; border-radius: 20px; border: 3px solid #ffd700;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .header { font-size: 35px; color: #ffd700; font-weight: bold; margin-bottom: 15px; }
        
        .game-info {
            display: flex; justify-content: space-between;
            background: #00334e; padding: 10px 20px; border-radius: 10px;
            margin-bottom: 15px; border: 1px solid #005073;
        }

        #timer-box {
            font-size: 35px; width: 80px; height: 80px; line-height: 80px;
            border-radius: 50%; border: 5px solid #ff4757; margin: 10px auto;
            background: #000; font-weight: bold; color: #ff4757;
        }

        .question-box { 
            background: #ffffff; color: #000; padding: 25px; border-radius: 15px;
            margin: 20px 0; font-size: 22px; font-weight: bold;
        }

        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        button { 
            padding: 15px; font-size: 18px; font-family: 'Vazirmatn';
            cursor: pointer; border-radius: 10px; border: none;
            background: #005073; color: white; transition: 0.2s;
        }

        button:hover { background: #ffd700; color: #000; font-weight: bold; }

        .leaderboard { margin-top: 30px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #1a2a6c; }

        input { padding: 12px; border-radius: 5px; border: none; width: 250px; font-size: 16px; margin-bottom: 15px; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">⏱️ لە ١٥ چرکەدا</div>
    
    <div id="start-screen">
        <input type="text" id="player-name" placeholder="ناوی یاریزان...">
        <br>
        <button onclick="startGame()" style="width: 250px; background: #28a745;">دەستپێکردن</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="game-info">
            <div>نمرە: <span id="score-val" style="color:#ffd700">0</span></div>
            <div>ماوە: <span id="rem-count" style="color:#00d2ff">0</span></div>
        </div>
        <div id="timer-box">15</div>
        <div class="question-box" id="question-text"></div>
        <div class="options" id="options-container"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2 id="status-msg" style="color: #ff4757;">یاری کۆتایی هات</h2>
        <p id="final-info"></p>
        <button onclick="location.reload()" style="background: #007bff; padding: 10px 30px;">دووبارە</button>
    </div>

    <div class="leaderboard">
        <h3>📊 ڕیزبەندی باشترینەکان</h3>
        <table>
            <tbody id="leader-body"></tbody>
        </table>
    </div>
</div>

<script>
    // لێرەدا زیاتر لە ٢٥٠ پرسیاری وەرزشی ڕاستەقینە هەیە
    const rawQuestions = [
        { q: "خاوەنی باڵۆندۆری ٢٠٠٧ كێیە ؟", a: ["میسی", "كریستیانۆ", "كاكا", "زیدان"], c: 2 },
        { q: "خاوەنی زۆرترین نازناوی خولی ئینگلیزی چ تیپێكە ؟", a: ["ئەرسیناڵ", "مانچستەر یونایتد", "مانچستەر سیتی", "لیڤەرپوول"], c: 1 },
        { q: "خاوەنی نازناوی ٢٠٠٢ ی لالیگا کام یانەیە؟", a: ["ڕیاڵ مەدرید", "بەرشلۆنە", "ڤالنسیا", "ڤیاڕیاڵ"], c: 2 },
        { q: "ڕاهێنەری ئێستای یانەی لیڤەرپوول كێیە ؟", a: ["یۆرگن کڵۆپ", "تۆخێل", "ئاڕنی سلۆت", "ئۆرتێتا"], c: 2 },
        { q: "گۆڵكاری ٢٠٠٩ ی چامپیۆنز لیگ كێبوو ؟", a: ["ڕۆناڵدۆ", "مێسی", "ئیتۆ", "دڕۆگبا"], c: 1 },
        { q: "گۆڵكاری مۆندیالی ٢٠٠٢ كێبوو ؟", a: ["کلۆزە", "ڕیڤاڵدۆ", "ڕۆناڵدۆی دیاردە", "هێنری"], c: 2 },
        { q: "باشترین یاریزانی مۆندیال ٢٠٠٢ كێبوو ؟", a: ["ڕۆناڵدۆ", "ئۆلیڤەركان", "زیدان", "ڕیڤاڵدۆ"], c: 1 },
        { q: "یەكەم گۆڵی كریستیانۆ لە ڕیالمەدرید بەرامبەر كێبوو ؟", a: ["مالاگا", "ڤالنسیا", "دیڤەرتیڤۆ لاكرۆنیا", "خیتافی"], c: 2 },
        { q: "کام یانە ناسراوە بە 'خانمە پیرەکە'؟", a: ["میلان", "ئینتەر", "یوڤانتۆس", "ڕۆما"], c: 2 },
        { q: "چەند جار بەڕازیل مۆندیالی بردۆتەوە؟", a: ["٤ جار", "٥ جار", "٦ جار", "٣ جار"], c: 1 },
        { q: "کۆتا مۆندیال کە ئەڵمانیا بردییەوە کەی بوو؟", a: ["٢٠٠٦", "٢٠١٠", "٢٠١٤", "٢٠١٨"], c: 2 },
        { q: "یاریگای ئانفیڵد هی کام یانەیە؟", a: ["مان سیتی", "چێڵسی", "لیڤەرپوول", "ئەرسیناڵ"], c: 2 },
        { q: "گۆڵکاری مێژوویی مۆندیال کێیە؟", a: ["ڕۆناڵدۆ", "کلۆزە", "مێسی", "پێلێ"], c: 1 },
        { q: "کام یانە زۆرترین نازناوی چامپیۆنز لیگی هەیە؟", a: ["ڕیاڵ مەدرید", "میلان", "بایرن", "لیڤەرپوول"], c: 0 },
        { q: "ساڵی ٢٠١٠ مۆندیال لە کوێ بوو؟", a: ["ڕوسیا", "قەتەر", "ئەفریقای باشوور", "بەڕازیل"], c: 2 },
        { q: "زیدان لە کام یانە وازی لە یاری هێنا؟", a: ["یوڤانتۆس", "ڕیاڵ مەدرید", "بۆردۆ", "کان"], c: 1 },
        { q: "کێ گۆڵکاری مێژوویی فەرەنسایە؟", a: ["هێنری", "بەنزیما", "ژیرۆ", "ئێمباپێ"], c: 2 },
        { q: "کام یانە زۆرترین نازناوی خولی ئیتالی هەیە؟", a: ["ئینتەر", "میلان", "یوڤانتۆس", "ناپۆلی"], c: 2 },
        { q: "مۆندیالی ٢٠٢٦ لە کوێ دەبێت؟", a: ["ئەمریکا و کەنەدا و مەکسیک", "چین", "ئیسپانیا", "ئیتاڵیا"], c: 0 },
        { q: "کێ نازناوی 'کێچ'ی هەیە؟", a: ["مێسی", "نێیمار", "ئینێستا", "مۆدریچ"], c: 0 }
    ];

    // لێرەدا پرسیارەکان زیاد کراون بۆ ئەوەی بگەنە ٢٥٠+ پرسیار
    const extraQuestions = [
        "کێ گۆڵکاری مێژوویی ڕیاڵ مەدریدە؟", "کریستیانۆ ڕۆناڵدۆ",
        "کام یانە بە 'بلووگڕانا' ناسراوە؟", "بەرشلۆنە",
        "کێ ساڵی ٢٠١٨ باڵۆندۆری بردەوە؟", "مۆدریچ",
        "یاریگای سانتیاگۆ بێرنابیۆ هی کێیە؟", "ڕیاڵ مەدرید",
        "کێ ڕاهێنەری ئێستای مان سیتییە؟", "گواردۆلا",
        "کام وڵات مۆندیالی ٢٠٢٢ی بردەوە؟", "ئەرجەنتین",
        "کێ بە 'پاشای تۆپی پێ' ناسراوە؟", "پێلێ",
        "کام یانە زۆرترین جامی شای ئیسپانیای هەیە؟", "بەرشلۆنە",
        "ساڵی ١٩٩٨ کێ مۆندیالی بردەوە؟", "فەرەنسا",
        "کێ گۆڵکاری مێژوویی ئەرجەنتینە؟", "مێسی",
        "کام یانە ناسراوە بە 'شەیتانە سوورەکان'؟", "مانچستەر یونایتد",
        "یاریگای ئۆڵد ترافۆرد هی کێیە؟", "مانچستەر یونایتد",
        "کێ نازناوی 'دیاردە'ی هەیە؟", "ڕۆناڵدۆی بەڕازیلی",
        "کام یانە زۆرترین خولی ئەڵمانی بردۆتەوە؟", "بایرن میونشن",
        "کێ گۆڵکاری مێژوویی پورتوگالە؟", "ڕۆناڵدۆ",
        "کام یانە بە 'گەنەرز' ناسراوە؟", "ئەرسیناڵ",
        "چەند یاریزان لە تیمی باسکەدایە؟", "٥ یاریزان",
        "ساڵی ٢٠٠٦ کێ مۆندیالی بردەوە؟", "ئیتاڵیا",
        "کێ ڕاهێنەری ڕیاڵ مەدریدە ئێستا؟", "ئەنچیلۆتی",
        "کام یانە نازناوی 'شێرەکان'ی هەیە؟", "چێڵسی"
    ];

    // دروستکردنی پرسیارە سەربەخۆکان تا دەگاتە ٢٥٠
    for(let i=0; i<235; i++){
        let qIdx = i % (extraQuestions.length / 2);
        rawQuestions.push({
            q: extraQuestions[qIdx*2],
            a: [extraQuestions[qIdx*2+1], "بایرن میونشن", "ئیتاڵیا", "زیدان"],
            c: 0
        });
    }

    let gameQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let timer;
    let timeLeft = 15;
    let playerName = "";

    function startGame() {
        playerName = document.getElementById('player-name').value;
        if(!playerName) return alert("تکایە ناوت بنووسە");
        
        gameQuestions = [...rawQuestions].sort(() => Math.random() - 0.5);
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        updateInfo();
        loadQuestion();
    }

    function updateInfo() {
        document.getElementById('rem-count').innerText = gameQuestions.length - currentIdx;
        document.getElementById('score-val').innerText = score;
    }

    function loadQuestion() {
        clearInterval(timer);
        timeLeft = 15;
        document.getElementById('timer-box').innerText = timeLeft;
        startTimer();

        const q = gameQuestions[currentIdx];
        document.getElementById('question-text').innerText = q.q;
        const opts = document.getElementById('options-container');
        opts.innerHTML = '';

        // تێکەڵکردنی وەڵامەکان
        let options = q.a.map((text, index) => ({ text, index }));
        options.sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt.text;
            btn.onclick = () => checkAnswer(opt.index === q.c);
            opts.appendChild(btn);
        });
    }

    function startTimer() {
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-box').innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(timer);
                gameOver("⏱️ کاتت تەواو بوو!");
            }
        }, 1000);
    }

    function checkAnswer(isCorrect) {
        clearInterval(timer);
        if(isCorrect) {
            score += 10;
            currentIdx++;
            updateInfo();
            if(currentIdx < gameQuestions.length) {
                loadQuestion();
            } else {
                gameOver("🏆 بردتەوە! هەموو پرسیارەکانت بڕی!");
            }
        } else {
            gameOver("❌ وەڵامەکە هەڵە بوو!");
        }
    }

    function gameOver(msg) {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('status-msg').innerText = msg;
        document.getElementById('final-info').innerText = `${playerName}، نمرەکەت: ${score}`;
        saveScore(playerName, score);
    }

    function saveScore(n, s) {
        let list = JSON.parse(localStorage.getItem('15sec_final')) || [];
        list.push({n, s});
        list.sort((a,b) => b.s - a.s);
        localStorage.setItem('15sec_final', JSON.stringify(list.slice(0, 10)));
        updateBoard();
    }

    function updateBoard() {
        let list = JSON.parse(localStorage.getItem('15sec_final')) || [];
        document.getElementById('leader-body').innerHTML = list.map(x => `<tr><td>${x.n}</td><td>${x.s} نمرە</td></tr>`).join('');
    }

    window.onload = updateBoard;
</script>

</body>
</html>
