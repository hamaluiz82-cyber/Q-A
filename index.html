<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لە ١٥ چرکەدا - پێشبڕکێی وەرزشی</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap');

        body { 
            font-family: 'Vazirmatn', sans-serif; 
            background: radial-gradient(circle, #0f2027, #203a43, #2c5364);
            color: white; text-align: center; margin: 0; padding: 20px; min-height: 100vh;
        }

        .container { 
            max-width: 800px; margin: 20px auto; background: rgba(0, 0, 0, 0.9); 
            padding: 30px; border-radius: 20px; border: 4px solid #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
        }

        .header { font-size: 40px; color: #ffd700; font-weight: bold; text-shadow: 2px 2px 10px #000; }
        
        #timer-box {
            font-size: 40px; width: 90px; height: 90px; line-height: 90px;
            border-radius: 50%; border: 6px solid #ff4757; margin: 20px auto;
            background: #000; font-weight: bold;
        }

        .question-box { 
            background: #1e272e; padding: 30px; border-radius: 15px;
            margin: 20px 0; font-size: 24px; border-right: 8px solid #ffd700;
        }

        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        button { 
            padding: 18px; font-size: 20px; font-family: 'Vazirmatn';
            cursor: pointer; border-radius: 10px; border: 2px solid #555;
            background: #2f3542; color: white; transition: 0.3s;
        }

        button:hover { background: #ffd700; color: black; border-color: #fff; }

        .leaderboard { margin-top: 40px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #444; font-size: 18px; }
        th { color: #ffd700; }

        input { padding: 15px; border-radius: 10px; border: none; width: 280px; font-size: 18px; margin-bottom: 20px; text-align: center; }
        .hidden { display: none; }
        .score-text { color: #ffd700; font-size: 22px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">⏱️ لە ١٥ چرکەدا</div>
    <p>وەڵامێکی هەڵە = کۆتایی یاری</p>

    <div id="start-screen">
        <input type="text" id="player-name" placeholder="ناوەکەت بنووسە...">
        <br>
        <button onclick="startGame()" style="width: 280px; background: #2ed573; border: none; font-weight: bold;">دەستپێکردنی یاری</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="timer-box">15</div>
        <div class="question-box" id="question-text"></div>
        <div class="options" id="options-container"></div>
        <p class="score-text">نمرەی ئێستا: <span id="score-val">0</span></p>
    </div>

    <div id="result-screen" class="hidden">
        <h2 id="status-msg" style="color: #ff4757; font-size: 30px;">دۆڕای!</h2>
        <p id="final-info" style="font-size: 22px;"></p>
        <button onclick="location.reload()" style="background: #1e90ff; padding: 15px 40px;">دووبارە هەوڵبدەوە</button>
    </div>

    <div class="leaderboard">
        <h3>📊 لیستەی ١٠ باشترینەکان</h3>
        <table>
            <thead><tr><th>ناو</th><th>نمرە</th></tr></thead>
            <tbody id="leader-body"></tbody>
        </table>
    </div>
</div>

<script>
    const allQuestions = [
        // پرسیارە نوێیەکانت
        { q: "خاوەنی باڵۆندۆری ٢٠٠٧ كێیە ؟", a: ["میسی", "كریستیانۆ", "كاكا", "زیدان"], c: 2 },
        { q: "خاوەنی زۆرترین نازناوی خولی ئینگلیزی چ تیپێكە ؟", a: ["ارسناڵ", "مانچستر یونایتد", "مانچستر سیتی", "لیڤەرپوول"], c: 1 },
        { q: "خاوەنی نازناوی ٢٠٠٢ ی لالیگا کام یانەیە؟", a: ["ڕیاڵ مەدرید", "بەرشلۆنە", "ڤالنسیا", "ڤیاڕیاڵ"], c: 2 },
        { q: "ڕاهێنەری ئێستای یانەی لیڤەرپوول كێیە ؟", a: ["یۆرگن کڵۆپ", "ئاڕنی سلۆت", "چابی ئەلۆنسۆ", "ئینزاکی"], c: 1 },
        { q: "گۆڵكاری ٢٠٠٩ ی چامپیۆنز لیگ كێبوو ؟", a: ["ڕۆناڵدۆ", "مێسی", "بەنزیما", "ئیتۆ"], c: 1 },
        { q: "گۆڵكاری مۆندیالی ٢٠٠٢ كێبوو ؟", a: ["ڕیڤاڵدۆ", "کلۆزە", "ڕۆناڵدۆی دیاردە", "زیدان"], c: 2 },
        { q: "باشترین یاریزانی مۆندیال ٢٠٠٢ كێبوو ؟", a: ["ڕۆبەرتۆ کارلۆس", "ڕیڤاڵدۆ", "ڕۆناڵدۆ", "ئۆلیڤەركان"], c: 3 },
        { q: "یەكەم گۆڵی كریستیانۆ لە ڕیالمەدرید بەرامبەر كێبوو ؟", a: ["خیتافی", "ڤالنسیا", "دیڤەرتیڤۆ لاكرۆنیا", "مالاگا"], c: 2 },
        
        // نموونەی پرسیاری تر (دەتوانیت تا ٢٥٠ لێرە زیاد بکەیت)
        { q: "کێ گۆڵکاری مێژوویی تۆپی پێیە؟", a: ["مێسی", "ڕۆناڵدۆ", "پێلێ", "بیکام"], c: 1 },
        { q: "کۆتا نازناوی مۆندیالی ئیتالیا کەی بوو؟", a: ["١٩٨٢", "١٩٩٠", "٢٠٠٦", "٢٠١٠"], c: 2 },
        { q: "یاریگای ئالیانز ئەرینا هی کام یانەیە؟", a: ["دۆرتمۆند", "بایرن میونشن", "لایپزیگ", "هامبۆرگ"], c: 1 },
        { q: "چەند جار بەڕازیل مۆندیالی بردۆتەوە؟", a: ["٤ جار", "٥ جار", "٦ جار", "٣ جار"], c: 1 },
        { q: "کێ نازناوی 'کێچ'ی لێنراوە؟", a: ["ئینێستا", "مێسی", "مۆدریچ", "بێرناردۆ سیلڤا"], c: 1 },
        { q: "کێ ڕاهێنەری ڕیاڵ مەدریدە ئێستا؟", a: ["زیدان", "ئەنچیلۆتی", "مۆرینھۆ", "ڕائول"], c: 1 },
        { q: "کام یانە نازناوی 'شەیتانە سوورەکان'ی هەیە؟", a: ["لیڤەرپوول", "ئەرسیناڵ", "مان یونایتد", "میلان"], c: 2 },
        { q: "کێ خاوەنی خێراترین گۆڵی مێژووی مۆندیالە؟", a: ["هاکان شوکور", "پێلێ", "مێسی", "کلۆزە"], c: 0 },
        { q: "کام یاریزان گۆڵی مۆندیالی ٢٠١٠ی کۆتایی تۆمارکرد؟", a: ["چاڤی", "تۆرێس", "ئینێستا", "ڤیا"], c: 2 },
        { q: "باشترین یاریزانی مۆندیالی ٢٠٢٢ کێ بوو؟", a: ["ئێمباپێ", "مێسی", "مۆدریچ", "دی ماریا"], c: 1 }
    ];

    // دروستکردنی پرسیاری هەڕەمەکی زیاتر بۆ پڕکردنەوەی ٢٥٠ پرسیارەکە
    for(let i=1; i<=230; i++) {
        allQuestions.push({
            q: `پرسیاری وەرزشی ژمارە ${i+20}: کام یانە زۆرترین جار ${i+5} گۆڵی کردووە؟`,
            a: ["ڕیاڵ", "بەرسا", "بایرن", "سیتی"],
            c: Math.floor(Math.random() * 4)
        });
    }

    let gameQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let timer;
    let timeLeft = 15;
    let playerName = "";

    function startGame() {
        playerName = document.getElementById('player-name').value;
        if(!playerName) return alert("تکایە ناوت بنووسە!");
        
        // تێکەڵکردنی پرسیارەکان
        gameQuestions = allQuestions.sort(() => Math.random() - 0.5);
        
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        clearInterval(timer);
        timeLeft = 15;
        document.getElementById('timer-box').innerText = timeLeft;
        document.getElementById('timer-box').style.color = "white";
        
        startTimer();

        const q = gameQuestions[currentIdx];
        document.getElementById('question-text').innerText = q.q;
        const opts = document.getElementById('options-container');
        opts.innerHTML = '';

        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i);
            opts.appendChild(btn);
        });
    }

    function startTimer() {
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-box').innerText = timeLeft;
            if(timeLeft <= 5) document.getElementById('timer-box').style.color = "#ff4757";
            
            if(timeLeft <= 0) {
                clearInterval(timer);
                gameOver("⏱️ کاتت تەواو بوو!");
            }
        }, 1000);
    }

    function checkAnswer(i) {
        clearInterval(timer);
        if(i === gameQuestions[currentIdx].c) {
            score += 10;
            document.getElementById('score-val').innerText = score;
            currentIdx++;
            if(currentIdx < gameQuestions.length) {
                loadQuestion();
            } else {
                gameOver("🏆 نایابە! تۆ هەموو پرسیارەکانت بڕی!");
            }
        } else {
            gameOver("❌ وەڵامەکە هەڵە بوو!");
        }
    }

    function gameOver(msg) {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('status-msg').innerText = msg;
        document.getElementById('final-info').innerText = `${playerName}، تۆ توانیت ${score} نمرە کۆبکەیتەوە.`;
        saveScore(playerName, score);
    }

    function saveScore(n, s) {
        let list = JSON.parse(localStorage.getItem('15sec_final')) || [];
        list.push({n, s});
        list.sort((a,b) => b.s - a.s);
        localStorage.setItem('15sec_final', JSON.stringify(list.slice(0, 10)));
        updateBoard();
    }

    function updateBoard() {
        let list = JSON.parse(localStorage.getItem('15sec_final')) || [];
        document.getElementById('leader-body').innerHTML = list.map(x => `<tr><td>${x.n}</td><td>${x.s}</td></tr>`).join('');
    }

    window.onload = updateBoard;
</script>

</body>
</html>
