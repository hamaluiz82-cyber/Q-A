<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کویزی وەرزشی تایبەت</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap');
        body { font-family: 'Vazirmatn', sans-serif; background: radial-gradient(circle, #001529, #000c18); color: white; text-align: center; margin: 0; padding: 15px; overflow-x: hidden; }
        .container { max-width: 700px; margin: 20px auto; background: #001e36; padding: 30px; border-radius: 20px; border: 3px solid #ffd700; box-shadow: 0 0 50px rgba(0,0,0,0.7); }
        .header { font-size: 35px; color: #ffd700; font-weight: bold; margin-bottom: 10px; }
        .score-display { font-size: 22px; color: #ffd700; background: #00334e; padding: 10px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #005073; }
        #timer-box { font-size: 40px; width: 80px; height: 80px; line-height: 80px; border-radius: 50%; border: 5px solid #ff4757; margin: 15px auto; background: #000; font-weight: bold; color: #ff4757; }
        .question-box { background: #ffffff; color: #000; padding: 25px; border-radius: 15px; margin: 20px 0; font-size: 22px; font-weight: bold; min-height: 70px; display: flex; align-items: center; justify-content: center; line-height: 1.5; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 16px; font-size: 17px; font-family: 'Vazirmatn'; cursor: pointer; border-radius: 12px; border: none; background: #005073; color: white; transition: 0.3s; }
        button:hover { background: #ffd700; color: #000; font-weight: bold; }
        .leaderboard { margin-top: 35px; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px; border: 1px solid #ffd70022; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #1a2a6c; text-align: center; }
        th { color: #ffd700; }
        input { padding: 15px; border-radius: 10px; border: 2px solid #ffd700; width: 80%; max-width: 300px; font-size: 18px; margin-bottom: 20px; text-align: center; background: #000; color: #fff; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">⚽ کویزە وەرزشییەکەت</div>
    
    <div id="start-screen">
        <p>وەڵامی ڕاست نمرەت پێ دەدات، وەڵامی هەڵە یارییەکە کۆتایی پێ دەهێنێت.</p>
        <input type="text" id="player-name" placeholder="ناوەکەت لێرە بنووسە...">
        <br>
        <button onclick="startGame()" style="width: 200px; background: #28a745;">دەستپێکردن</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="score-display">نمرەکەت: <span id="score-val">0</span></div>
        <div id="timer-box">15</div>
        <div class="question-box" id="question-text"></div>
        <div class="options" id="options-container"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2 id="status-msg" style="color: #ff4757; font-size: 30px;">کۆتایی هات!</h2>
        <p id="final-info" style="font-size: 22px;"></p>
        <button onclick="location.reload()" style="background: #007bff; padding: 12px 30px; border-radius: 10px;">دووبارە هەوڵ بدەوە</button>
    </div>

    <div class="leaderboard">
        <h3>🏆 ١٠ باشترین نمرەکان</h3>
        <table>
            <thead><tr><th>ناو</th><th>نمرە</th></tr></thead>
            <tbody id="leader-body"></tbody>
        </table>
    </div>
</div>

<script>
    // ⚠️ لینکی فایەربەیس لێرە دابنێ ⚠️
    const FIREBASE_URL = "https://in-15-second-default-rtdb.firebaseio.com/scores.json";

        { q: "گۆڵكاری مێژووی خولی ئینگلیزی كێیە ؟", a: ["ئالان شێرەر", "ڕۆناڵدۆ", "مایكڵ ئۆون", "ڕۆنی"], c: 0 },
        { q: "چەند ساڵ جارێك مۆندیال دەكرێت ؟", a: ["دوو", "سێ", "چوار", "پێنج"], c: 2 },

        { q: "پاڵەوانی وەرزی ٢٠١٣ ی لالیگا كێبوو ؟", a: ["ڕیال مەدرید", "بەرشلۆنە", "ڤالێنسیا", "ئەتڵاتیكۆ مەدرید"], c: 3 },

        { q: "یاریزانی هێڵی ناوەند کێڤن دی برۆین خەڵکی کام وڵاتە؟", a: ["ئەڵمانیا", "هۆڵەندا", "بەلجیکا", "فەڕەنسا"], c: 2 },
        { q: "نازناوی Zizou بۆ کام یاریزان بەکاردێت؟", a: ["میشێل پلاتینی", "زینەدین زیدان", "تیێری هێنری", "کەریم بنزێما"], c: 1 },
        { q: "کام گۆڵپارێز بە جاڵجاڵۆکە ڕەشەکە ناسرابوو؟", a: ["ئیکەر کاسیاس", "لیڤ یاشین", "پیتر شیمایکل", "ئۆلیڤەر کان"], c: 1 },
        { q: "کام یاریزان بە ئەندازیار ناسراوە لە هێڵی ناوەنددا؟", a: ["چاڤی هێرناندێز", "ئەندریا پیرلۆ", "سێرجیۆ بوسکێس", "تۆنی کروس"], c: 1 },
        { q: "کام یاریزان لە یەک ساڵدا (٢٠١٢) ٩١ گۆڵی تۆمارکرد؟", a: ["کریستیانۆ ڕۆناڵدۆ", "ڕۆبەرت لیڤاندۆڤسکی", "لیۆنێل میسی", "گێرد مۆلەر"], c: 2 },
        { q: "جود بێلینگهام لە چ هێڵێکی یاریگا یاری دەکات؟", a: ["بەرگری", "هێرشبەر", "ناوەند", "گۆڵپارێز"], c: 2 },
        { q: "کام یاریزانی ئیتاڵی بە كلكە ئەسپە ئاڵتوونییەکە ناسرابوو؟", a: ["فرانچیسکۆ تۆتی", "ئەلیساندرۆ دێل پیرۆ", "ڕۆبێرتۆ باجیۆ", "پاولۆ ماڵدینی"], c: 2 },
        { q: "کام یاریزان لە سێ کۆتایی جامی جیهانی جیاوازدا گۆڵی تۆمارکردووە؟", a: ["پێلێ", "زینەدین زیدان", "کیلیان ئێمباپێ", "ڤاڤا"], c: 2 },
        { q: "ئەلفریدۆ دی ستیفانۆ بۆ کام دوو هەڵبژاردە یاری فەرمی کردووە؟", a: ["ئەرجەنتین و برازیل", "ئەرجەنتین و ئیسپانیا", "ئیسپانیا و ئیتاڵیا", "ئەرجەنتین و ئۆڵۆمبیا"], c: 1 },
        { q: "ڕاهێنەر ئۆتۆ ڕێهاگڵ لە ٢٠٠٤ لەگەڵ کام هەڵبژاردە موعجیزەی ئەنجامدا؟", a: ["دانیمارک", "یۆنان", "پورتوگال", "چیک"], c: 1 },
        { q: "کێ یەکەم یاریزانی ئەورووپی بوو کە باڵۆن دۆر بباتەوە؟", a: ["ستانلی ماتیۆس", "بۆبی چاڕڵتۆن", "لیڤ یاشین", "جۆرج بێست"], c: 0 },
        { q: "کام یاریزان بە مەجەرییە لێهاتووەکە دەناسرایەوە؟", a: ["ساندۆر کۆچیش", "فێرێنک پوشکاش", "ناندۆر هیدێگکوتی", "زۆڵتان سیبۆر"], c: 1 },
        { q: "کێ ئەو ڕاهێنەرە بوو کە یانەی لێستەر سیتی گەیاندە نازناوی ٢٠١٦؟", a: ["نایجل پیرسۆن", "کلاودیۆ ڕانێری", "بێندان ڕۆجەرز", "خۆسێ پیۆنێل"], c: 1 },
        { q: "یاریزان باستیان شواینشتایگەر لە کام یانە وازی لە یاری هێنا؟", a: ["بایرن میونشن", "مانچستەر یونایتد", "شیکاگۆ فایەر", "لۆس ئەنجلۆس گالاکسی"], c: 2 },
        { q: "کام ڕاهێنەر بە The Normal One خۆی ناساند؟", a: ["پێپ گواردیۆلا", "یۆرگن کڵۆپ", "تۆماس توخێل", "ماوریسیۆ پۆچێتینۆ"], c: 1 },
        { q: "کێ گۆڵکاری مێژوویی فەڕەنسا بوو پێش ئۆلیڤیێ جیرو؟", a: ["تیێری هێنری", "میشێل پلاتینی", "زینەدین زیدان", "جەست فۆنتێن"], c: 0 },
        { q: "یاریزان سۆکراتیس جگە لە تۆپی پێ، خاوەنی چ بڕوانامەیەکی زانستی بوو؟", a: ["ئەندازیاری", "پزیشکی", "پارێزەری", "فەلەکناسی"], c: 1 }
    ];

    let gameQs = [];
    let curIdx = 0;
    let score = 0;
    let timer;
    let timeLeft = 15;
    let pName = "";

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    async function loadBoard() {
        try {
            const r = await fetch(FIREBASE_URL);
            const d = await r.json();
            if(!d) return;
            let arr = Object.values(d).sort((a,b) => b.score - a.score).slice(0, 10);
            document.getElementById('leader-body').innerHTML = arr.map(x => `<tr><td>${x.name}</td><td>${x.score}</td></tr>`).join('');
        } catch(e) {}
    }

    function startGame() {
        pName = document.getElementById('player-name').value.trim();
        if(!pName) return alert("ناوت بنووسە!");
        gameQs = shuffle([...questions]);
        curIdx = 0;
        score = 0;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        showQ();
    }

    function showQ() {
        clearInterval(timer);
        if(curIdx >= gameQs.length) return end("🏆 هەموو پرسیارەکانت بڕی!");
        timeLeft = 15;
        document.getElementById('timer-box').innerText = timeLeft;
        document.getElementById('score-val').innerText = score;
        const q = gameQs[curIdx];
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.a.forEach((opt, i) => {
            const b = document.createElement('button');
            b.innerText = opt;
            b.onclick = () => {
                if(i === q.c) { score++; curIdx++; showQ(); }
                else { end("❌ وەڵامەکەت هەڵە بوو!"); }
            };
            container.appendChild(b);
        });
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-box').innerText = timeLeft;
            if(timeLeft <= 0) { clearInterval(timer); end("⏱️ کاتت تەواو بوو!"); }
        }, 1000);
    }

    async function end(msg) {
        clearInterval(timer);
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('status-msg').innerText = msg;
        document.getElementById('final-info').innerText = `${pName}: ${score} خاڵ`;
        try {
            await fetch(FIREBASE_URL, {
                method: 'POST',
                body: JSON.stringify({ name: pName, score: score, date: Date.now() })
            });
            loadBoard();
        } catch(e) {}
    }

    window.onload = loadBoard;
</script>
</body>
</html>
