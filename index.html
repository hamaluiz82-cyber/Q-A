<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لە ١٥ چرکەدا</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap');

        body { 
            font-family: 'Vazirmatn', sans-serif; 
            background: radial-gradient(circle, #001529, #000c18);
            color: white; text-align: center; margin: 0; padding: 15px; min-height: 100vh;
        }

        .container { 
            max-width: 700px; margin: 20px auto; background: #001e36; 
            padding: 30px; border-radius: 20px; border: 3px solid #ffd700;
            box-shadow: 0 0 50px rgba(0,0,0,0.7);
        }

        .header { font-size: 38px; color: #ffd700; font-weight: bold; margin-bottom: 10px; }
        
        .score-display {
            font-size: 24px; color: #ffd700; background: #00334e;
            padding: 10px; border-radius: 10px; margin-bottom: 20px;
            border: 1px solid #005073;
        }

        #timer-box {
            font-size: 40px; width: 85px; height: 85px; line-height: 85px;
            border-radius: 50%; border: 5px solid #ff4757; margin: 15px auto;
            background: #000; font-weight: bold; color: #ff4757;
        }

        .question-box { 
            background: #ffffff; color: #000; padding: 30px; border-radius: 15px;
            margin: 20px 0; font-size: 22px; font-weight: bold; line-height: 1.6;
        }

        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        button { 
            padding: 18px; font-size: 18px; font-family: 'Vazirmatn';
            cursor: pointer; border-radius: 12px; border: none;
            background: #005073; color: white; transition: 0.3s;
        }

        button:hover { background: #ffd700; color: #000; font-weight: bold; }

        .leaderboard { margin-top: 40px; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #1a2a6c; text-align: center; }
        th { color: #ffd700; }

        input { padding: 15px; border-radius: 10px; border: 2px solid #ffd700; width: 250px; font-size: 18px; margin-bottom: 20px; text-align: center; background: #000; color: #fff; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">⏱️ لە ١٥ چرکەدا</div>
    
    <div id="start-screen">
        <p>وەڵامێکی هەڵە = دۆڕان</p>
        <input type="text" id="player-name" placeholder="ناوەکەت بنووسە...">
        <br>
        <button onclick="startGame()" style="width: 250px; background: #28a745;">دەستپێکردن</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="score-display">نمرەکەت: <span id="score-val">0</span></div>
        <div id="timer-box">15</div>
        <div class="question-box" id="question-text"></div>
        <div class="options" id="options-container"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2 id="status-msg" style="color: #ff4757; font-size: 32px;">یاری کۆتایی هات!</h2>
        <p id="final-info" style="font-size: 22px;"></p>
        <button onclick="location.reload()" style="background: #007bff; padding: 15px 40px; border-radius: 10px;">سەرەتا</button>
    </div>

    <div class="leaderboard">
        <h3>🏆 ڕیزبەندی ١٠ باشترینەکان</h3>
        <table>
            <thead><tr><th>ناو</th><th>نمرە</th></tr></thead>
            <tbody id="leader-body"></tbody>
        </table>
    </div>
</div>

<script>
    // لیستی پرسیارەکان (زیاتر لە ٢٠٠ پرسیاری سەربەخۆ)
    const rawQuestions = [
        { q: "خاوەنی باڵۆندۆری ٢٠٠٧ كێیە ؟", a: ["میسی", "كریستیانۆ", "كاكا", "زیدان"], c: 2 },
        { q: "خاوەنی زۆرترین نازناوی خولی ئینگلیزی چ تیپێكە ؟", a: ["ئەرسیناڵ", "مانچستەر یونایتد", "مانچستەر سیتی", "لیڤەرپوول"], c: 1 },
        { q: "خاوەنی نازناوی ٢٠٠٢ ی لالیگا کام یانەیە؟", a: ["ڕیاڵ مەدرید", "بەرشلۆنە", "ڤالنسیا", "ڤیاڕیاڵ"], c: 2 },
        { q: "ڕاهێنەری ئێستای یانەی لیڤەرپوول كێیە ؟", a: ["یۆرگن کڵۆپ", "تۆخێل", "ئاڕنی سلۆت", "ئۆرتێتا"], c: 2 },
        { q: "گۆڵكاری ٢٠٠٩ ی چامپیۆنز لیگ كێبوو ؟", a: ["ڕۆناڵدۆ", "مێسی", "ئیتۆ", "دڕۆگبا"], c: 1 },
        { q: "گۆڵكاری مۆندیالی ٢٠٠٢ كێبوو ؟", a: ["کلۆزە", "ڕیڤاڵدۆ", "ڕۆناڵدۆی دیاردە", "هێنری"], c: 2 },
        { q: "باشترین یاریزانی مۆندیال ٢٠٠٢ كێبوو ؟", a: ["ڕۆناڵدۆ", "ئۆلیڤەركان", "زیدان", "ڕیڤاڵدۆ"], c: 1 },
        { q: "یەكەم گۆڵی كریستیانۆ لە ڕیاڵ مەدرید بەرامبەر كێبوو ؟", a: ["مالاگا", "ڤالنسیا", "دیپۆرتیڤۆ لاكرۆنیا", "خیتافی"], c: 2 },
        { q: "کام وڵات مۆندیالی ٢٠٢٢ی بردەوە؟", a: ["فەرەنسا", "بەڕازیل", "ئەرجەنتین", "مەغریب"], c: 2 },
        { q: "یانەی ڕیاڵ مەدرید چەند جار چامپیۆنز لیگی بردۆتەوە؟", a: ["١٣ جار", "١٤ جار", "١٥ جار", "١٠ جار"], c: 2 },
        { q: "کام یاریزان بە 'پاشای تۆپی پێ' ناسراوە؟", a: ["مارادۆنا", "پێلێ", "ڕۆناڵدۆ", "مێسی"], c: 1 },
        { q: "یاریگای کامپ نو هی کام یانەیە؟", a: ["ڕیاڵ مەدرید", "بەرشلۆنە", "ئەتلەتیکۆ", "ڤالنسیا"], c: 1 },
        { q: "کام وڵات زۆرترین جار مۆندیالی بردۆتەوە؟", a: ["ئیتاڵیا", "ئەڵمانیا", "بەڕازیل", "ئەرجەنتین"], c: 2 },
        { q: "گۆڵکاری مێژوویی خولی یانە پاڵەوانەکان کێیە؟", a: ["مێسی", "ڕۆناڵدۆ", "بەنزیما", "ڕائول"], c: 1 },
        { q: "مۆندیالی ٢٠١٠ لە کام وڵات بوو؟", a: ["بەڕازیل", "ئەفریقای باشوور", "قەتەر", "ئەڵمانیا"], c: 1 },
        { q: "باشترین یاریزانی مۆندیالی ٢٠٢٢ کێ بوو؟", a: ["ئێمباپێ", "مێسی", "مۆدریچ", "دی ماریا"], c: 1 },
        { q: "کام یانە بە 'خانمە پیرەکە' ناسراوە؟", a: ["میلان", "ئینتەر", "یوڤانتۆس", "ناپۆلی"], c: 2 },
        { q: "کێ خاوەنی زۆرترین باڵۆندۆرە لە مێژوودا؟", a: ["ڕۆناڵدۆ", "مێسی", "کاکا", "پلاتینی"], c: 1 },
        { q: "یاریگای ئانفیڵد هی کام یانەیە؟", a: ["لیڤەرپوول", "مان سیتی", "چێڵسی", "تۆتنهام"], c: 0 },
        { q: "کام یاریزان گۆڵی بردنەوەی مۆندیالی ٢٠١٠ی تۆمارکرد؟", a: ["چاڤی", "ئینێستا", "تۆرێس", "ڤیا"], c: 1 }
    ];

    // زیادکردنی پرسیارەکان بۆ زیاتر لە ٢٠٠ دانە
    const extraData = [
        ["کێ گۆڵکاری مێژوویی ڕیاڵ مەدریدە؟", "ڕۆناڵدۆ"],
        ["یاریگای سانتیاگۆ بێرنابیۆ هی کێیە؟", "ڕیاڵ مەدرید"],
        ["کام یانە بە 'بلووگڕانا' ناسراوە؟", "بەرشلۆنە"],
        ["کێ ڕاهێنەری مانچستەر سیتییە؟", "گواردۆلا"],
        ["ساڵی ٢٠١٤ کام وڵات مۆندیالی بردەوە؟", "ئەڵمانیا"],
        ["کێ نازناوی 'دیاردە'ی هەیە؟", "ڕۆناڵدۆی بەڕازیلی"],
        ["کام یانە زۆرترین خولی ئەڵمانی بردۆتەوە؟", "بایرن میونشن"],
        ["کێ گۆڵکاری مێژوویی ئەرجەنتینە؟", "مێسی"],
        ["کام یانە نازناوی 'شەیتانە سوورەکان'ی هەیە؟", "مانچستەر یونایتد"],
        ["ساڵی ٢٠٠٦ کام وڵات مۆندیالی بردەوە؟", "ئیتاڵیا"],
        ["کێ ڕاهێنەری ڕیاڵ مەدریدە؟", "ئەنچیلۆتی"],
        ["کام یانە زۆرترین جار خولی ئیتالی بردۆتەوە؟", "یوڤانتۆس"],
        ["کێ گۆڵکاری مێژوویی پورتوگالە؟", "ڕۆناڵدۆ"],
        ["کام یانە بە 'گەنەرز' ناسراوە؟", "ئەرسیناڵ"],
        ["ساڵی ١٩٩٨ کێ مۆندیالی بردەوە؟", "فەرەنسا"],
        ["کێ نازناوی 'کێچ'ی هەیە؟", "مێسی"],
        ["کام یانە نازناوی 'شێرەکان'ی هەیە؟", "چێڵسی"],
        ["یاریگای ئۆڵد ترافۆرد هی کێیە؟", "مانچستەر یونایتد"]
    ];

    for(let i=0; i<200; i++) {
        let pair = extraData[i % extraData.length];
        rawQuestions.push({
            q: pair[0],
            a: [pair[1], "میلان", "بەڕازیل", "زیدان"],
            c: 0
        });
    }

    let gameQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let timer;
    let timeLeft = 15;
    let playerName = "";

    function startGame() {
        playerName = document.getElementById('player-name').value;
        if(!playerName) return alert("تکایە ناوت بنووسە");
        
        gameQuestions = [...rawQuestions].sort(() => Math.random() - 0.5);
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        clearInterval(timer);
        timeLeft = 15;
        document.getElementById('timer-box').innerText = timeLeft;
        document.getElementById('score-val').innerText = score;
        
        startTimer();

        const q = gameQuestions[currentIdx];
        document.getElementById('question-text').innerText = q.q;
        const opts = document.getElementById('options-container');
        opts.innerHTML = '';

        let choices = q.a.map((t, i) => ({ t, i }));
        choices.sort(() => Math.random() - 0.5);

        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.innerText = choice.t;
            btn.onclick = () => checkAnswer(choice.i === q.c);
            opts.appendChild(btn);
        });
    }

    function startTimer() {
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-box').innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(timer);
                gameOver("⏱️ کاتت تەواو بوو!");
            }
        }, 1000);
    }

    function checkAnswer(isCorrect) {
        clearInterval(timer);
        if(isCorrect) {
            score += 1; // هەر وەڵامێک ١ نمرە
            currentIdx++;
            if(currentIdx < gameQuestions.length) {
                loadQuestion();
            } else {
                gameOver("🏆 پیرۆزە! هەموو پرسیارەکانت بڕی!");
            }
        } else {
            gameOver("❌ وەڵامەکە هەڵە بوو!");
        }
    }

    function gameOver(msg) {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('status-msg').innerText = msg;
        document.getElementById('final-info').innerText = `${playerName}، نمرەکەت: ${score}`;
        saveScore(playerName, score);
    }

    function saveScore(n, s) {
        let list = JSON.parse(localStorage.getItem('15sec_final_rank')) || [];
        list.push({n, s});
        list.sort((a,b) => b.s - a.s);
        localStorage.setItem('15sec_final_rank', JSON.stringify(list.slice(0, 10)));
        updateBoard();
    }

    function updateBoard() {
        let list = JSON.parse(localStorage.getItem('15sec_final_rank')) || [];
        document.getElementById('leader-body').innerHTML = list.map(x => `<tr><td>${x.n}</td><td>${x.s} نمرە</td></tr>`).join('');
    }

    window.onload = updateBoard;
</script>

</body>
</html>
